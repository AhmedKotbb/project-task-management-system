services:
  postgres:
    image: postgres:16-alpine
    container_name: ptms-postgres
    restart: no
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ptms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ptms_dev}
      POSTGRES_DB: ${POSTGRES_DB:-project_task_management}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ptms} -d ${POSTGRES_DB:-project_task_management}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
